name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: vendor-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://myticket-api.kat-jr.com' }}
          VITE_API_PREFIX: ${{ vars.VITE_API_PREFIX || '/api/v1/main' }}
          VITE_MAIN_WEBSITE_URL: ${{ vars.VITE_MAIN_WEBSITE_URL || 'https://myticket.kat-jr.com' }}
          VITE_VENDOR_DASHBOARD_URL: ${{ vars.VITE_VENDOR_DASHBOARD_URL || 'https://myticket-vendor.kat-jr.com' }}
        run: bun run build
