name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vendor-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL || 'https://myticket-api.kat-jr.com' }}
          VITE_API_PREFIX: ${{ vars.VITE_API_PREFIX || '/api/v1/main' }}
          VITE_MAIN_WEBSITE_URL: ${{ vars.VITE_MAIN_WEBSITE_URL || 'https://myticket.com' }}
          VITE_VENDOR_DASHBOARD_URL: ${{ vars.VITE_VENDOR_DASHBOARD_URL || 'https://vendor.myticket.com' }}
          VITE_UPLOAD_URL: ${{ vars.VITE_UPLOAD_URL || secrets.VITE_UPLOAD_URL || '' }}
        run: bun run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync dist to /var/www/html/myticket/myticket-vendor
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=yes" \
            dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/myticket/myticket-vendor"
